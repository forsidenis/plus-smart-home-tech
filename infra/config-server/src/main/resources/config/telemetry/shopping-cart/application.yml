server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/shopping_cart_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    ru.yandex.practicum.commerce.shoppingcart: DEBUG