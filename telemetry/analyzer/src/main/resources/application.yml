spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/analyzer-db
    username: postgres
    password: 123456789
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 6000
      connection-timeout: 1000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      continue-on-error: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcTransactionManagerAutoConfiguration

grpc:
  # gRPC-сервер анализатору не нужен (только клиент), поэтому явно не указываем порт
  client:
    hub-router:
      address: 'static://localhost:59090'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

logging:
  level:
    ru.yandex.practicum.analyzer: DEBUG
    com.zaxxer.hikari: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level --- [%thread] %logger{36} : %msg%n"

analyzer:
  kafka:
    consumer:
      hubs:
        group-id: analyzer.hubs
        auto-offset-reset: earliest
        enable-auto-commit: false
      snapshots:
        group-id: analyzer.snapshots
        auto-offset-reset: earliest
        enable-auto-commit: false
    topics:
      hubs: telemetry.hubs.v1
      snapshots: telemetry.snapshots.v1