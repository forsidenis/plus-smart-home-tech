syntax = "proto3";

package telemetry;

import "google/protobuf/empty.proto";
import "telemetry/messages/sensor_event.proto";
import "telemetry/messages/hub_event.proto";

option java_package = "ru.yandex.practicum.grpc.telemetry.collector";
option java_multiple_files = true;

// gRPC-сервис коллектора
service CollectorController {
  // Получить событие от датчика
  rpc CollectSensorEvent (SensorEventProto) returns (google.protobuf.Empty);

  // Получить событие от хаба
  rpc CollectHubEvent (HubEventProto) returns (google.protobuf.Empty);
}